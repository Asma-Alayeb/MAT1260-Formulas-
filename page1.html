<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAT1260 Normal Distribution</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
        margin: 0;
        line-height: 1.8;
    }

    /* Sidebar */
    nav {
        width: 220px;
        background-color: #6a0dad;
        color: #ffd700;
        min-height: 100vh;
        position: fixed;
        left: 0;
        top: 0;
        padding-top: 20px;
    }

    nav ul { list-style: none; padding: 0; }
    nav li { text-align: center; margin-bottom: 20px; }

    nav a {
        color: #ffd700;
        text-decoration: none;
        font-weight: bold;
        display: block;
        padding: 10px;
    }

    nav a:hover {
        background-color: #b8860b;
        color: white;
    }

    /* FIXED HEADER */
    header {
        background-color: #6a0dad;
        color: white;
        padding: 15px;
        text-align: center;
        border-bottom: 5px solid #b8860b;

        margin-left: 220px; /* aligns with sidebar */
    }

    /* Content */
    .content {
        margin-left: 240px;
        padding: 20px;
        max-width: 900px;
    }

    canvas {
        border: 1px solid #ccc;
        margin-top: 20px;
    }

    input {
        margin: 5px;
    }

    .area-display {
        font-weight: bold;
        color: #6a0dad;
        margin: 10px 0;
    }

    .calculator {
        background: #fff;
        padding: 15px;
        border-radius: 10px;
        margin-top: 25px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
</style>
</head>

<body>

<nav>
    <ul>
        <li><a href="index.html">Formulas</a></li>
        <li><a href="page1.html">Normal Curve</a></li>
    </ul>
</nav>

<header>
    <h1>Normal Distribution Interactive Curve</h1>
</header>

<div class="content">

<h3>Interactive Normal Curve</h3>

<label><input type="radio" name="type" value="left" checked> Left</label>
<label><input type="radio" name="type" value="right"> Right</label>
<label><input type="radio" name="type" value="between"> Between</label>

<br>

z1: <input type="number" id="z1" value="1" step="0.1">
<span id="z2box" style="display:none;">
z2: <input type="number" id="z2" value="2" step="0.1">
</span>

<div class="area-display" id="area"></div>

<canvas id="canvas" width="600" height="300"></canvas>

<!-- Z SCORE CALCULATOR -->
<div class="calculator">
    <h3>Z-Score Calculator</h3>
    x: <input type="number" id="xVal">
    mean: <input type="number" id="meanVal">
    sd: <input type="number" id="sdVal">

    <button onclick="calcZ()">Calculate</button>

    <p id="zResult"></p>
</div>

</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function pdf(x){
    return (1/Math.sqrt(2*Math.PI))*Math.exp(-0.5*x*x);
}

function erf(x){
    const a1=0.254829592,a2=-0.284496736,a3=1.421413741,a4=-1.453152027,a5=1.061405429,p=0.3275911;
    const sign = x>=0?1:-1;
    x=Math.abs(x);
    const t=1/(1+p*x);
    return sign*(1-(((((a5*t+a4)*t+a3)*t+a2)*t+a1)*t*Math.exp(-x*x)));
}

function cdf(x){
    return 0.5*(1+erf(x/Math.sqrt(2)));
}

function draw(){
    const type = document.querySelector('input[name="type"]:checked').value;
    const z1 = parseFloat(document.getElementById("z1").value);
    const z2 = parseFloat(document.getElementById("z2").value);

    ctx.clearRect(0,0,600,300);

    function xPix(x){ return (x+4)/8*600; }
    function yPix(y){ return 300 - y*300*1.5; }

    let start=-4,end=4;
    if(type==="left"){ start=-4; end=z1; }
    if(type==="right"){ start=z1; end=4; }
    if(type==="between"){ start=z1; end=z2; }

    // Shade
    ctx.beginPath();
    ctx.moveTo(xPix(start),300);
    for(let x=start;x<=end;x+=0.01){
        ctx.lineTo(xPix(x), yPix(pdf(x)));
    }
    ctx.lineTo(xPix(end),300);
    ctx.fillStyle="rgba(106,13,173,0.3)";
    ctx.fill();

    // Curve
    ctx.beginPath();
    for(let x=-4;x<=4;x+=0.01){
        if(x===-4) ctx.moveTo(xPix(x),yPix(pdf(x)));
        else ctx.lineTo(xPix(x),yPix(pdf(x)));
    }
    ctx.strokeStyle="#6a0dad";
    ctx.lineWidth=3;
    ctx.stroke();

    let area;
    if(type==="left") area=cdf(z1);
    if(type==="right") area=1-cdf(z1);
    if(type==="between") area=cdf(z2)-cdf(z1);

    document.getElementById("area").innerText="Area = "+area.toFixed(4);
}

function calcZ(){
    const x = parseFloat(document.getElementById("xVal").value);
    const mean = parseFloat(document.getElementById("meanVal").value);
    const sd = parseFloat(document.getElementById("sdVal").value);

    const z = (x - mean)/sd;
    document.getElementById("zResult").innerText = "z = " + z.toFixed(4);
}

document.querySelectorAll("input").forEach(el=>el.addEventListener("input",draw));
document.querySelectorAll("input[name='type']").forEach(el=>el.addEventListener("change",()=>{
    document.getElementById("z2box").style.display =
        el.value==="between" ? "inline" : "none";
}));

draw();
</script>

</body>
</html>
