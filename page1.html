<header>
    <h1>Normal Distribution Interactive Curve</h1>
</header>

<div class="main-content">

<!-- Z SCORE CALCULATOR (NOW ABOVE CURVE) -->
<div class="calculator">
    <h3>Z-Score Calculator</h3>
    <label>X: <input type="number" id="xVal"></label><br>
    <label>Mean (μ): <input type="number" id="meanVal"></label><br>
    <label>SD (σ): <input type="number" id="sdVal"></label><br><br>
    <button onclick="calcZ()">Compute</button>
    <p id="zResult"></p>
</div>

<!-- ORIGINAL NORMAL CURVE -->
<div class="area-display" id="areaDisplay">P(X ≤ z) = 0.8413</div>
<canvas id="normalCanvas" width="600" height="300"></canvas>

</div>

<script>
const canvas = document.getElementById("normalCanvas");
const ctx = canvas.getContext("2d");
const width = canvas.width;
const height = canvas.height;

function normalPDF(x) {
    return (1/Math.sqrt(2*Math.PI)) * Math.exp(-0.5*x*x);
}

function xToPixel(x) { return (x + 4) / 8 * width; }
function yToPixel(y) { return height - y * height * 1.5; }

function drawCurve(){
    ctx.clearRect(0,0,width,height);

    // curve
    ctx.beginPath();
    for(let x=-4; x<=4; x+=0.01){
        let px = xToPixel(x);
        let py = yToPixel(normalPDF(x));
        if(x===-4) ctx.moveTo(px,py);
        else ctx.lineTo(px,py);
    }
    ctx.strokeStyle="#6a0dad";
    ctx.lineWidth=3;
    ctx.stroke();
}

drawCurve();

/* Z SCORE CALCULATOR */
function calcZ(){
    let x = parseFloat(document.getElementById("xVal").value);
    let mean = parseFloat(document.getElementById("meanVal").value);
    let sd = parseFloat(document.getElementById("sdVal").value);

    if(isNaN(x)||isNaN(mean)||isNaN(sd)||sd===0){
        document.getElementById("zResult").innerText="Enter valid values";
        return;
    }

    let z = (x-mean)/sd;
    document.getElementById("zResult").innerText="z = " + z.toFixed(3);
}
</script>
